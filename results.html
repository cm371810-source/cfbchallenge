<style>
:root{--bg:#f3f5f7;--card:#fff;--text:#17202a;--muted:#667085;--line:#d8dee6;--b10:#174ea6;--sec:#8b1e1e}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
.container{max-width:1050px;margin:0 auto;padding:28px 18px 48px}
.hero{background:#111827;color:#fff;border-radius:18px;padding:26px;margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:32px}
.hero p{margin:0;color:#d1d5db}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:16px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
button,a.button{border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.primary{background:#111827;color:#fff}
.secondary{background:#e5e7eb;color:#111827}
.status{margin:14px 0;color:var(--muted);font-weight:700}
.game{display:grid;grid-template-columns:1fr auto;gap:14px;padding:14px 0;border-bottom:1px solid #e5e7eb}
.game:last-child{border-bottom:0}
.game small{color:var(--muted)}
.game-score{text-align:right;font-size:18px;font-weight:800;white-space:nowrap}

.winner{font-size:34px;font-weight:900;text-align:center;margin-top:20px;padding:22px;border-radius:14px;background:#eef2ff}
.standard{border-left:5px solid #d4a017;padding-left:12px}
.breakdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.breakdown-item{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:14px;text-align:center}
.breakdown-item span{display:block;color:var(--muted);font-size:13px;margin-bottom:5px}
.breakdown-item strong{font-size:24px;display:block}

@media(max-width:650px){.breakdown-grid{grid-template-columns:1fr}}

.commissioner-title{text-align:center;font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:900;margin:0 0 14px}
.grade-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.grade-strip>div{border:1px solid var(--border);border-radius:14px;padding:17px 14px;text-align:center;background:#f8fafc}
.grade-strip span{display:block;color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.35;min-height:18px}
.grade-strip strong{display:block;font-size:36px;line-height:1;padding-top:2px}
.report-placeholder{padding:22px;text-align:center;color:var(--muted);background:#f8fafc;border-radius:14px}
.overall-verdict{border-radius:14px;background:#111827;color:#fff;padding:20px;text-align:center;font-size:18px;line-height:1.45}
.overall-verdict b{display:block;font-size:26px;margin-bottom:7px}
@media(max-width:650px){.grade-strip{grid-template-columns:1fr}}


  .scorecard-stack{display:grid;gap:18px}
  .score-category{border:1px solid var(--border);border-radius:16px;padding:20px;background:#fff}
  .score-category h3{margin:0;font-size:20px}
  .score-category .category-subtitle{display:block;color:var(--muted);font-size:13px;margin-top:4px}

  .category-grade span{display:block;font-weight:800;font-size:15px}
  .category-grade strong{display:block;font-size:42px;line-height:1}
  .category-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .category-metric{border-top:1px solid var(--border);padding-top:11px}
  .category-metric span{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
  .category-metric strong{display:block;font-size:17px}
  .network-report{border-color:#7c3aed;background:#faf7ff}
  .commissioner-category{border-color:#0f766e}

  .commissioner-divider{height:1px;background:var(--border);margin:22px 0}
  @media(max-width:760px){.category-metrics{grid-template-columns:1fr 1fr}}


  .recap-section{margin-bottom:26px}

  .recap-heading{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:14px}

  .recap-grade{min-width:74px;height:64px;padding:0 16px;border-radius:14px;display:grid;place-items:center;background:#111827;color:#fff;font-size:34px;font-weight:900;line-height:1}
  .recap-subtitle{margin:-5px 0 16px;color:var(--muted);font-size:14px}
  .recap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .recap-box{border:1px solid var(--border);border-radius:14px;padding:16px;background:#f8fafc}
  .recap-box span{display:block;color:var(--muted);font-size:12px;margin-bottom:9px}
  .recap-box strong{display:block;font-size:21px;line-height:1.15}
  .recap-box small{display:block;color:var(--muted);font-size:11px;margin-top:6px;line-height:1.3}
  .challenge-recap{border-top:5px solid #1d4ed8;padding-top:18px}
  .commissioner-recap{border-top:5px solid #0f766e;padding-top:18px}
  .network-recap{border-top:5px solid #7c3aed;padding-top:18px}
  .review-recap{margin-top:24px;border-radius:16px;background:#111827;color:#fff;padding:22px;text-align:center;font-size:17px;line-height:1.5}
  .review-recap b{display:block;font-size:25px;margin-bottom:8px}
  .scorecard-separator{height:1px;background:var(--border);margin:30px 0}
  @media(max-width:760px){
    .recap-grid{grid-template-columns:1fr 1fr}
    .recap-heading{align-items:flex-start}
  }

</style>

<body>
<main class="container">
  <section class="hero">
    <h1>Big Ten–SEC Challenge Simulation</h1>
    <p>The draft created the matchups. This page exists solely to play the Challenge and determine the winner.</p>
  </section>

  <section class="card">
    <div class="actions">
      <a class="button secondary" href="big-ten-sec-draft-simulator-v17.html">Draft Again</a>
    </div>
    <div id="status" class="status">Simulating all 16 games from the completed draft…</div>
    <div id="winner" class="winner" style="display:none"></div>
  </section>

  <section class="card verdict-card">
    <div id="commissionerReports">
      <div class="report-placeholder">Building the Challenge recap…</div>
    </div>
  </section>

  <section class="card">
    <h2>Game Results</h2>
    <div id="games">Playing the Challenge…</div>
  </section>
</main>

<script>
const params=new URLSearchParams(window.location.search);
const encoded=params.get("draft");
const demoDraft={"draftMode":"B10","philosophy":55,"champion":{"home":{"name":"Ohio State","r":90.0},"away":{"name":"Texas","r":89.0},"homeConf":"B10","p":0.5919119667227271,"line":"Ohio State -3.5","standardBearer":true},"games":[{"home":{"name":"Oregon","r":86.5},"away":{"name":"Georgia","r":85.5},"homeConf":"B10","p":0.5919119667227271,"line":"Oregon -3.5","grade":{"letter":"\u2014"}},{"home":{"name":"Alabama","r":80.5},"away":{"name":"Indiana","r":86.0},"homeConf":"SEC","p":0.42098041259948604,"line":"Indiana -3.0","grade":{"letter":"\u2014"}},{"home":{"name":"Michigan","r":81.0},"away":{"name":"Oklahoma","r":82.5},"homeConf":"B10","p":0.5265375393676139,"line":"Michigan -1.0","grade":{"letter":"\u2014"}},{"home":{"name":"Ole Miss","r":81.5},"away":{"name":"USC","r":81.5},"homeConf":"SEC","p":0.5660185351961015,"line":"Ole Miss -2.5","grade":{"letter":"\u2014"}},{"home":{"name":"Penn State","r":79.5},"away":{"name":"LSU","r":81.5},"homeConf":"B10","p":0.5132781272800339,"line":"Penn State -0.5","grade":{"letter":"\u2014"}},{"home":{"name":"Texas A&M","r":82.0},"away":{"name":"Washington","r":78.5},"homeConf":"SEC","p":0.654188113761243,"line":"Texas A&M -6.0","grade":{"letter":"\u2014"}},{"home":{"name":"Iowa","r":78.0},"away":{"name":"Tennessee","r":77.5},"homeConf":"B10","p":0.579019587400514,"line":"Iowa -3.0","grade":{"letter":"\u2014"}},{"home":{"name":"Florida","r":76.0},"away":{"name":"Nebraska","r":72.5},"homeConf":"SEC","p":0.654188113761243,"line":"Florida -6.0","grade":{"letter":"\u2014"}},{"home":{"name":"Illinois","r":72.0},"away":{"name":"Missouri","r":73.5},"homeConf":"B10","p":0.5265375393676139,"line":"Illinois -1.0","grade":{"letter":"\u2014"}},{"home":{"name":"Auburn","r":73.0},"away":{"name":"Minnesota","r":71.0},"homeConf":"SEC","p":0.617305023181202,"line":"Auburn -4.5","grade":{"letter":"\u2014"}},{"home":{"name":"Wisconsin","r":70.0},"away":{"name":"South Carolina","r":72.0},"homeConf":"B10","p":0.5132781272800339,"line":"Wisconsin -0.5","grade":{"letter":"\u2014"}},{"home":{"name":"Vanderbilt","r":69.5},"away":{"name":"UCLA","r":69.5},"homeConf":"SEC","p":0.5660185351961015,"line":"Vanderbilt -2.5","grade":{"letter":"\u2014"}},{"home":{"name":"Maryland","r":65.0},"away":{"name":"Arkansas","r":66.5},"homeConf":"B10","p":0.5265375393676139,"line":"Maryland -1.0","grade":{"letter":"\u2014"}},{"home":{"name":"Mississippi State","r":64.6},"away":{"name":"Northwestern","r":64.5},"homeConf":"SEC","p":0.5686266227261574,"line":"Mississippi State -2.6","grade":{"letter":"\u2014"}},{"home":{"name":"Rutgers","r":61.0},"away":{"name":"Kentucky","r":63.5},"homeConf":"B10","p":0.5,"line":"Pick'em","grade":{"letter":"\u2014"}}]};
let draft=null;
try{
  draft=encoded
    ? JSON.parse(decodeURIComponent(escape(atob(encoded))))
    : demoDraft;
  if(!encoded){
    document.getElementById("status").textContent="Demo draft loaded. The Challenge will simulate automatically.";
  }
}catch(e){
  draft=demoDraft;
  document.getElementById("status").textContent="Draft data could not be loaded, so a demo draft was loaded instead.";
}

function conferenceOf(team){
  const b10=["Indiana","Ohio State","Oregon","Penn State","Michigan","USC","Iowa","Washington","Illinois","Nebraska","Northwestern","Wisconsin","Maryland","Minnesota","UCLA","Rutgers","Michigan State","Purdue"];
  return b10.includes(team.name)?"B10":"SEC";
}

let simulationHasRun=false;
function simulate(){
  if(simulationHasRun) return;
  simulationHasRun=true;
  const card=[draft.champion,...draft.games];
  let b10Wins=0,secWins=0;
  let b10Points=0,secPoints=0;
  let b10RoadWins=0,secRoadWins=0;
  let b10ATS=0,secATS=0,pushes=0;
  let standardBearerWinner=null;
  let biggestWin=null;
  let biggestUpset=null;
  let upsetCount=0;
  let oneScoreGames=0;
  let totalActualMargin=0;
  let totalTV=0;
  let marqueeGames=0;
  const rows=[];
  const gameOutcomes=[];

  function parseSpread(line,home,away){
    if(!line || line==="Pick'em") return {favorite:null,spread:0};
    const split=line.lastIndexOf(" -");
    if(split===-1) return {favorite:null,spread:0};
    const favoriteName=line.slice(0,split);
    const spread=parseFloat(line.slice(split+2));
    if(favoriteName===home.name) return {favorite:"home",spread};
    if(favoriteName===away.name) return {favorite:"away",spread};
    return {favorite:null,spread:0};
  }

  function brandScore(team){
    const r=team.r;
    if(r>=86) return 100;
    if(r>=81) return 88;
    if(r>=77) return 76;
    if(r>=72) return 62;
    if(r>=66) return 48;
    return 34;
  }

  function gameTVScore(g){
    const spread=parseSpread(g.line,g.home,g.away).spread;
    const competitiveness=Math.max(0,100-spread*5.5);
    const brands=(brandScore(g.home)+brandScore(g.away))/2;
    const location=conferenceOf(g.home)!==conferenceOf(g.away)?82:65;
    return 0.30*brandScore(g.home)+0.30*brandScore(g.away)+0.30*competitiveness+0.10*location;
  }

  function letterGrade(score){
    if(score>=93)return "A+";
    if(score>=88)return "A";
    if(score>=84)return "A−";
    if(score>=80)return "B+";
    if(score>=75)return "B";
    if(score>=70)return "B−";
    if(score>=65)return "C+";
    if(score>=60)return "C";
    if(score>=55)return "C−";
    if(score>=48)return "D";
    return "F";
  }

  function randomNormal(){
    // Box-Muller transform: one standard-normal draw.
    let u=0,v=0;
    while(u===0) u=Math.random();
    while(v===0) v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
  }

  function projectedHomeMargin(g){
    const spreadInfo=parseSpread(g.line,g.home,g.away);
    if(spreadInfo.favorite==="home") return spreadInfo.spread;
    if(spreadInfo.favorite==="away") return -spreadInfo.spread;
    return 0;
  }

  function createScore(g){
    const expectedHomeMargin=projectedHomeMargin(g);
    const spread=Math.abs(expectedHomeMargin);

    // Close projected games can still separate, but extreme 30–40 point
    // outcomes are reserved for genuinely lopsided matchups.
    let homeMargin=Math.round(expectedHomeMargin+12.5*randomNormal());
    let marginCap;
    if(spread<=3) marginCap=21;
    else if(spread<=7) marginCap=24;
    else if(spread<=14) marginCap=31;
    else marginCap=45;

    homeMargin=Math.max(-marginCap,Math.min(marginCap,homeMargin));
    if(homeMargin===0) homeMargin=Math.random()<0.5?-1:1;

    let total=Math.round(51+10*randomNormal());
    total=Math.max(30,Math.min(79,total));

    if((total+homeMargin)%2!==0) total+=1;

    let homeScore=Math.round((total+homeMargin)/2);
    let awayScore=total-homeScore;

    if(homeScore<3){
      awayScore+=3-homeScore;
      homeScore=3;
    }
    if(awayScore<3){
      homeScore+=3-awayScore;
      awayScore=3;
    }

    if(homeScore===awayScore){
      if(homeMargin>0) homeScore+=1;
      else awayScore+=1;
    }

    return {homeScore,awayScore};
  }

  card.forEach((g,i)=>{
    const score=createScore(g);
    const homeWon=score.homeScore>score.awayScore;
    const winner=homeWon?g.home:g.away;
    const loser=homeWon?g.away:g.home;
    const winnerScore=homeWon?score.homeScore:score.awayScore;
    const loserScore=homeWon?score.awayScore:score.homeScore;
    const margin=winnerScore-loserScore;
    const winnerConf=conferenceOf(winner);
    const gameTV=gameTVScore(g);
    totalTV+=gameTV;
    totalActualMargin+=margin;
    if(margin<=8) oneScoreGames++;
    if(gameTV>=82) marqueeGames++;

    if(winnerConf==="B10") b10Wins++; else secWins++;

    if(conferenceOf(g.home)==="B10"){
      b10Points+=score.homeScore;
      secPoints+=score.awayScore;
    }else{
      secPoints+=score.homeScore;
      b10Points+=score.awayScore;
    }

    if(!homeWon){
      if(winnerConf==="B10") b10RoadWins++;
      else secRoadWins++;
    }

    if(i===0) standardBearerWinner=winnerConf;

    const spreadInfo=parseSpread(g.line,g.home,g.away);
    const actualHomeMargin=score.homeScore-score.awayScore;
    let coverConf=null;
    let isPush=false;

    if(spreadInfo.favorite==="home"){
      const atsMargin=actualHomeMargin-spreadInfo.spread;
      if(Math.abs(atsMargin)<0.001) isPush=true;
      else coverConf=atsMargin>0?conferenceOf(g.home):conferenceOf(g.away);
    }else if(spreadInfo.favorite==="away"){
      const actualAwayMargin=-actualHomeMargin;
      const atsMargin=actualAwayMargin-spreadInfo.spread;
      if(Math.abs(atsMargin)<0.001) isPush=true;
      else coverConf=atsMargin>0?conferenceOf(g.away):conferenceOf(g.home);
    }else{
      coverConf=winnerConf;
    }

    if(isPush) pushes++;
    else if(coverConf==="B10") b10ATS++;
    else if(coverConf==="SEC") secATS++;

    const favoriteWon=spreadInfo.favorite==="home"
      ? homeWon
      : spreadInfo.favorite==="away"
        ? !homeWon
        : null;

    if(favoriteWon===false){
      upsetCount++;
      if(!biggestUpset || spreadInfo.spread>biggestUpset.spread){
        biggestUpset={
          winner:winner.name,
          loser:loser.name,
          spread:spreadInfo.spread,
          score:`${winnerScore}–${loserScore}`
        };
      }
    }

    if(!biggestWin || margin>biggestWin.margin){
      biggestWin={
        winner:winner.name,
        loser:loser.name,
        margin,
        score:`${winnerScore}–${loserScore}`
      };
    }

    gameOutcomes.push({
      game:g,
      winnerConf,
      margin,
      gameTV,
      oneScore:margin<=8,
      upset:favoriteWon===false,
      roadWin:!homeWon,
      coverConf,
      isPush,
      spread:spreadInfo.spread,
      projectedHomeMargin:projectedHomeMargin(g)
    });

    rows.push(`<div class="game ${i===0?"standard":""}">
      <div>
        <b>${i===0?"Standard Bearer Game":`Game ${i}`}: ${g.away.name} at ${g.home.name}</b><br>
        <small>${g.line}${g.grade && g.grade.letter && g.grade.letter!=="—"?` · Draft grade ${g.grade.letter}`:""}</small>
      </div>
      <div class="game-score">
        ${g.away.name} ${score.awayScore}<br>
        ${g.home.name} ${score.homeScore}
        <small>${winner.name} by ${margin}</small>
      </div>
    </div>`);
  });

  document.getElementById("games").innerHTML=rows.join("");

  let winnerText;
  if(b10Wins>secWins){
    winnerText=`BIG TEN WINS THE CHALLENGE, ${b10Wins}–${secWins}`;
  }else if(secWins>b10Wins){
    winnerText=`SEC WINS THE CHALLENGE, ${secWins}–${b10Wins}`;
  }else{
    const champ=standardBearerWinner==="B10"?"BIG TEN":"SEC";
    winnerText=`CHALLENGE TIED 8–8 — ${champ} WINS THE STANDARD BEARER TIEBREAKER`;
  }

  const averageMargin=Math.abs(b10Points-secPoints)/card.length;
  const avgMarginLeader=b10Points===secPoints
    ? "Even"
    : `${b10Points>secPoints?"Big Ten":"SEC"} +${averageMargin.toFixed(1)} per game`;

  const biggestUpsetText=biggestUpset
    ? `${biggestUpset.score} over ${biggestUpset.loser} as a ${biggestUpset.spread.toFixed(1)}-point underdog`
    : "No underdog won";

  const averageTV=totalTV/card.length;
  const closeRate=oneScoreGames/card.length;
  const averageActualMargin=totalActualMargin/card.length;

  const topSix={
    B10:["Ohio State","Oregon","Indiana","USC","Michigan","Penn State"],
    SEC:["Texas","Georgia","Oklahoma","Texas A&M","Ole Miss","LSU"]
  };

  function challengeResultReport(conf){
    const confName=conf==="B10"?"Big Ten":"SEC";
    const wins=conf==="B10"?b10Wins:secWins;
    const losses=16-wins;
    const roadWins=gameOutcomes.filter(o=>o.winnerConf===conf&&o.roadWin).length;
    const upsets=gameOutcomes.filter(o=>o.winnerConf===conf&&o.upset).length;
    const atsWins=gameOutcomes.filter(o=>o.coverConf===conf).length;
    const atsPushes=gameOutcomes.filter(o=>o.isPush).length;

    const recordScore=Math.max(20,Math.min(100,50+(wins-8)*12));
    const roadScore=Math.min(100,roadWins*25);
    const upsetScore=Math.min(100,upsets*28);
    const atsPct=atsWins/Math.max(1,16-atsPushes);
    const atsScore=Math.max(25,Math.min(100,50+(atsPct-.5)*120));
    const score=0.55*recordScore+0.15*roadScore+0.15*upsetScore+0.15*atsScore;

    return {conf,confName,score,wins,losses,roadWins,upsets,atsWins,atsPushes};
  }

  function commissionerDecisionReport(conf){
    const confName=conf==="B10"?"Big Ten":"SEC";
    const confGames=draft.games.filter(g=>g.homeConf===conf);
    const confOutcomes=gameOutcomes.filter(o=>!o.game.standardBearer&&o.game.homeConf===conf);

    // Top-six/playoff-contender record for this conference.
    const contenderOutcomes=gameOutcomes.filter(o=>{
      const confTeams=topSix[conf];
      return confTeams.includes(o.game.home.name)||confTeams.includes(o.game.away.name);
    }).filter(o=>{
      const relevantTeam=topSix[conf].includes(o.game.home.name)?o.game.home:o.game.away;
      return conferenceOf(relevantTeam)===conf;
    });
    let contenderWins=0;
    contenderOutcomes.forEach(o=>{
      const relevantTeam=topSix[conf].includes(o.game.home.name)?o.game.home:o.game.away;
      if(o.winnerConf===conferenceOf(relevantTeam)) contenderWins++;
    });
    const contenderLosses=contenderOutcomes.length-contenderWins;

    // Home-field value: how often the commissioner used a home slot to create
    // a projected favorite, plus the average projected home edge.
    const favoriteHomeGames=confGames.filter(g=>projectedHomeMargin(g)>0).length;
    const avgHomeEdge=confGames.length
      ? confGames.reduce((sum,g)=>sum+projectedHomeMargin(g),0)/confGames.length
      : 0;

    // Risky picks: home teams drafted as 7+ point underdogs.
    const sevenPointDogGames=confGames.filter(g=>projectedHomeMargin(g)<=-7).length;

    const contenderPct=contenderOutcomes.length?contenderWins/contenderOutcomes.length:.5;
    const contenderScore=Math.max(25,Math.min(100,45+contenderPct*55));
    const homeFavoritePct=confGames.length?favoriteHomeGames/confGames.length:0;
    const homeFieldScore=Math.max(20,Math.min(100,45+homeFavoritePct*45+Math.max(-10,Math.min(10,avgHomeEdge))*2));
    const riskScore=Math.max(15,100-sevenPointDogGames*28);
    const score=0.40*contenderScore+0.40*homeFieldScore+0.20*riskScore;

    return {
      conf,confName,score,
      contenderWins,contenderLosses,
      favoriteHomeGames,totalHomeGames:confGames.length,
      avgHomeEdge,sevenPointDogGames
    };
  }

  // TV Network grade applies to the entire 16-game Challenge, not one conference.
  const blueBloodGames=card.filter(g=>brandScore(g.home)>=88&&brandScore(g.away)>=88).length;
  const averageProjectedSpread=card.reduce((sum,g)=>sum+parseSpread(g.line,g.home,g.away).spread,0)/card.length;
  const draftTVScore=Math.max(0,Math.min(100,
    0.42*averageTV+
    0.28*Math.max(0,100-averageProjectedSpread*6)+
    0.20*Math.min(100,blueBloodGames*22)+
    0.10*Math.min(100,marqueeGames*12.5)
  ));
  let resultsTVScore=0.60*(closeRate*100)+0.25*Math.max(0,100-averageActualMargin*5)+0.15*Math.min(100,upsetCount*18);
  resultsTVScore=Math.max(0,Math.min(100,resultsTVScore));
  const tvNetworkScore=0.75*draftTVScore+0.25*resultsTVScore;

  const reportConfs=draft.draftMode==="BOTH"
    ? ["B10","SEC"]
    : [draft.draftMode==="SEC"?"SEC":"B10"];

  function commissionerVerdict(challenge,commissioner){
    if(challenge.wins>=9 && commissioner.score>=84){
      return {
        title:"Master Commissioner",
        copy:"You built a smart slate, protected your contenders, and brought the Challenge trophy home. The conference office will be thrilled."
      };
    }
    if(challenge.wins<8 && commissioner.score>=84){
      return {
        title:"Great Plan, Tough Results",
        copy:"Your draft decisions were strong and your contenders were positioned well, but the games did not break your conference’s way."
      };
    }
    if(challenge.wins>=9 && commissioner.score<60){
      return {
        title:"You Won… But At What Cost?",
        copy:"The trophy came home, but the path included risky home-field decisions and too many unfavorable matchups."
      };
    }
    if(commissioner.sevenPointDogGames>=2){
      return {
        title:"Too Clever by Half",
        copy:"You repeatedly volunteered home teams for games where they were substantial underdogs. The ambition was admirable; the value was not."
      };
    }
    if(commissioner.favoriteHomeGames>=Math.max(1,commissioner.totalHomeGames-1)){
      return {
        title:"Chess Master",
        copy:"You maximized home-field value and consistently placed your conference in favorable positions. It was a commissioner’s draft more than a television executive’s draft."
      };
    }
    return {
      title:"Solid Commissioner Work",
      copy:"You produced a credible balance of contender protection, home-field value, and manageable risk without overplaying either strategy."
    };
  }

  const conferenceRecaps=reportConfs.map(conf=>{
    const challenge=challengeResultReport(conf);
    const commissioner=commissionerDecisionReport(conf);
    const verdict=commissionerVerdict(challenge,commissioner);
    return `
      <div class="conference-scorecard">
        <section class="recap-section challenge-recap">
          <div class="recap-heading">
            <h2>Challenge Result</h2>
            <div class="recap-grade">${letterGrade(challenge.score)}</div>
          </div>
          <p class="recap-subtitle">${challenge.confName} performance across the full 16-game Challenge.</p>
          <div class="recap-grid">
            <div class="recap-box"><span>Record</span><strong>${challenge.wins}–${challenge.losses}</strong></div>
            <div class="recap-box"><span>Road Wins</span><strong>${challenge.roadWins}</strong></div>
            <div class="recap-box"><span>Upsets</span><strong>${challenge.upsets}</strong></div>
            <div class="recap-box"><span>ATS Record</span><strong>${challenge.atsWins}–${16-challenge.atsWins-challenge.atsPushes}${challenge.atsPushes?`–${challenge.atsPushes}`:""}</strong></div>
          </div>
        </section>

        <section class="recap-section commissioner-recap">
          <div class="recap-heading">
            <h2>${challenge.confName} Commissioner Grade</h2>
            <div class="recap-grade">${letterGrade(commissioner.score)}</div>
          </div>
          <p class="recap-subtitle">How effectively the commissioner used the matchups they controlled.</p>
          <div class="recap-grid">
            <div class="recap-box"><span>Top-Six Teams Record</span><strong>${commissioner.contenderWins}–${commissioner.contenderLosses}</strong><small>Results for the conference’s six highest-rated teams.</small></div>
            <div class="recap-box"><span>Home Teams Favored</span><strong>${commissioner.favoriteHomeGames}/${commissioner.totalHomeGames}</strong><small>Drafted home teams projected to win.</small></div>
            <div class="recap-box"><span>Average Home Edge</span><strong>${commissioner.avgHomeEdge>=0?"+":""}${commissioner.avgHomeEdge.toFixed(1)}</strong><small>Average projected margin for commissioner-controlled home games.</small></div>
            <div class="recap-box"><span>7+ Point Underdog Picks</span><strong>${commissioner.sevenPointDogGames}</strong><small>Home teams placed in seriously unfavorable matchups.</small></div>
          </div>
        </section>

        <div class="review-recap">
          <b>${verdict.title}</b>
          ${verdict.copy}
        </div>
      </div>`;
  }).join('<div class="scorecard-separator"></div>');

  document.getElementById("commissionerReports").innerHTML=`
    ${conferenceRecaps}
    <div class="scorecard-separator"></div>
    <section class="recap-section network-recap">
      <div class="recap-heading">
        <h2>TV Network Report</h2>
        <div class="recap-grade">${letterGrade(tvNetworkScore)}</div>
      </div>
      <p class="recap-subtitle">The television quality of the entire 16-game Challenge.</p>
      <div class="recap-grid">
        <div class="recap-box"><span>Average Margin</span><strong>${averageActualMargin.toFixed(1)} points</strong></div>
        <div class="recap-box"><span>One-Score Games</span><strong>${oneScoreGames}/16</strong></div>
        <div class="recap-box"><span>Blue-Blood Matchups</span><strong>${blueBloodGames}</strong></div>
        <div class="recap-box"><span>Average Projected Spread</span><strong>${averageProjectedSpread.toFixed(1)}</strong></div>
      </div>
    </section>
  `;

  const winner=document.getElementById("winner");
  winner.textContent=winnerText;
  winner.style.display="block";
  document.getElementById("status").textContent="Challenge complete.";
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",()=>setTimeout(simulate,150));
}else{
  setTimeout(simulate,150);
}
</script>
</body>
</html>
